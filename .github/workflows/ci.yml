name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install deps
        uses: ./.github/actions/install-deps

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Publint
        run: pnpm --filter @toiroakr/lines-db publint

      - name: Run tests
        run: pnpm test

  # Cross-platform tests to catch platform-specific issues
  # (e.g., file system ordering differences affecting foreign key resolution)
  cross-platform-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
            name: Linux (bash)
          - os: windows-latest
            shell: pwsh
            name: Windows (PowerShell)
          - os: windows-latest
            shell: cmd
            name: Windows (CMD)
    runs-on: ${{ matrix.os }}
    name: Test - ${{ matrix.name }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Run validate command (reproduces Windows CMD foreign key issue)
        run: node lib/bin/cli.mjs validate tests/unit/fixtures
